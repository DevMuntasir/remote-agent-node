<!DOCTYPE html>
<html>

<head>
    <title>Cloud Control</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        :root {
            --bg: #0f172a;
            --bg-soft: #111b34;
            --surface: rgba(255, 255, 255, 0.08);
            --surface-strong: rgba(255, 255, 255, 0.12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.24);
            --success: #22c55e;
            --danger: #ef4444;
            --primary: #3b82f6;
            --neutral: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1300px 500px at 10% -5%, #223066 0%, transparent 65%),
                radial-gradient(900px 460px at 95% 2%, #134e4a 0%, transparent 70%),
                var(--bg);
            padding: 28px;
            line-height: 1.4;
        }

        .dashboard {
            max-width: 1080px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 18px;
            align-items: start;
        }

        .card {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.55));
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 20px 50px rgba(2, 6, 23, 0.35);
        }

        .card h2,
        .card h3 {
            margin: 0;
            font-weight: 650;
            letter-spacing: 0.2px;
        }

        .header-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
            text-align: left;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 13px;
            color: var(--text);
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        .status.connected::before {
            background: var(--success);
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }

        .status.error::before {
            background: var(--danger);
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .field-label {
            margin-top: 18px;
            margin-bottom: 8px;
            display: block;
            text-align: left;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        button {
            width: 100%;
            padding: 11px 14px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 650;
            letter-spacing: 0.2px;
            transition: transform 0.14s ease, filter 0.14s ease, box-shadow 0.18s ease;
            box-shadow: 0 10px 20px rgba(2, 6, 23, 0.2);
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(0.2);
        }

        .btn-rec {
            background: linear-gradient(180deg, #22c55e, #16a34a);
        }

        .btn-stop {
            background: linear-gradient(180deg, #ef4444, #dc2626);
        }

        .btn-cam {
            background: linear-gradient(180deg, #3b82f6, #2563eb);
        }

        .btn-all {
            background: linear-gradient(180deg, #64748b, #475569);
        }

        #agent-select {
            width: 100%;
            padding: 10px;
            margin: 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        #agent-select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        #selected-device {
            margin-top: 10px;
            font-size: 13px;
            color: #cbd5e1;
            text-align: left;
            border: 1px dashed rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            padding: 8px 10px;
        }

        .runtime-status {
            margin-top: 10px;
            display: grid;
            gap: 8px;
        }

        .status-chip-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .status-chip {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.02em;
            background: rgba(15, 23, 42, 0.4);
            color: #cbd5e1;
        }

        .status-chip.on {
            border-color: rgba(34, 197, 94, 0.45);
            background: rgba(34, 197, 94, 0.16);
            color: #bbf7d0;
        }

        .status-chip.off {
            border-color: rgba(239, 68, 68, 0.45);
            background: rgba(239, 68, 68, 0.14);
            color: #fecaca;
        }

        .status-chip.unknown {
            border-color: rgba(148, 163, 184, 0.35);
            background: rgba(100, 116, 139, 0.15);
            color: #cbd5e1;
        }

        .control-feedback {
            margin-top: 2px;
            margin-bottom: 2px;
            font-size: 13px;
            text-align: left;
            min-height: 18px;
        }

        .control-feedback.pending {
            color: #facc15;
        }

        .control-feedback.ok {
            color: #86efac;
        }

        .control-feedback.warn {
            color: #fca5a5;
        }

        .action-group {
            margin-top: 16px;
            display: grid;
            gap: 10px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .divider {
            margin: 16px 0 2px;
            border: 0;
            border-top: 1px solid var(--border);
        }

        .feed-shell {
            margin-top: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #020617;
            position: relative;
            min-height: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feed-shell::after {
            content: 'Camera stream preview';
            position: absolute;
            color: #64748b;
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            pointer-events: none;
        }

        .feed-shell.has-image::after {
            display: none;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #video-list {
            text-align: left;
            margin-top: 14px;
            display: grid;
            gap: 10px;
        }

        #video-list.empty::before {
            content: 'No recordings yet. New videos appear here automatically.';
            display: block;
            color: var(--muted);
            padding: 14px;
            border: 1px dashed rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            font-size: 14px;
        }

        a {
            color: #bfdbfe;
            text-decoration: none;
            display: block;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(96, 165, 250, 0.25);
            background: rgba(30, 41, 59, 0.45);
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        a:hover {
            background: rgba(37, 99, 235, 0.15);
            border-color: rgba(96, 165, 250, 0.5);
        }

        .hidden {
            display: none !important;
        }

        .auth-shell {
            max-width: 460px;
            margin: 0 auto 18px;
        }

        .auth-form {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .auth-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.7);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .auth-input:focus {
            border-color: rgba(59, 130, 246, 0.8);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .auth-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .auth-user {
            color: var(--muted);
            font-size: 12px;
            word-break: break-all;
        }

        #btn-logout {
            width: auto;
            padding: 8px 12px;
        }

        @media (max-width: 860px) {
            body {
                padding: 16px;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .action-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="auth-shell" class="auth-shell">
        <div class="card">
            <h2>Admin Login</h2>
            <p class="subtitle">Only authorized users can access this dashboard.</p>

            <form id="login-form" class="auth-form">
                <label class="field-label" for="login-email">Email</label>
                <input id="login-email" class="auth-input" type="email" required autocomplete="username" placeholder="admin@example.com" />

                <label class="field-label" for="login-password">Password</label>
                <input id="login-password" class="auth-input" type="password" required autocomplete="current-password" placeholder="Enter password" />

                <button id="btn-login" class="btn-cam" type="submit">Login</button>
            </form>

            <div id="auth-feedback" class="control-feedback"></div>
        </div>
    </div>

    <div id="dashboard" class="dashboard hidden">
        <div class="card">
            <div class="header-row">
                <div>
                    <h2>Remote Control</h2>
                    <p class="subtitle">Manage connected agents and live camera preview</p>
                </div>
                <div>
                    <div id="status" class="status">Authenticating...</div>
                    <div class="auth-row">
                        <div id="user-email" class="auth-user"></div>
                        <button id="btn-logout" class="btn-stop" type="button">Logout</button>
                    </div>
                </div>
            </div>

            <label class="field-label" for="agent-select">Target Device</label>
            <select id="agent-select">
                <option value="">No active device</option>
            </select>
            <div id="selected-device">Selected device: none</div>
            <div class="runtime-status">
                <div class="status-chip-row">
                    <div id="recording-chip" class="status-chip unknown">Recording: Unknown</div>
                    <div id="camera-chip" class="status-chip unknown">Camera: Unknown</div>
                </div>
                <div id="control-feedback" class="control-feedback"></div>
            </div>

            <div class="action-group">
                <div class="action-grid">
                    <button id="btn-start-rec" class="btn-rec" onclick="sendControl('admin_start_capture')">Start Recording</button>
                    <button id="btn-stop-rec" class="btn-stop" onclick="sendControl('admin_stop_capture')">Stop Recording</button>
                </div>
                <div class="action-grid">
                    <button id="btn-start-cam" class="btn-cam" onclick="sendControl('admin_start_camera')">Camera On</button>
                    <button id="btn-stop-cam" class="btn-stop" onclick="sendControl('admin_stop_camera')">Camera Off</button>
                </div>
                <hr class="divider">
                <div class="action-grid">
                    <button class="btn-all" onclick="send('admin_start_all')">Start All Recordings</button>
                    <button class="btn-all" onclick="send('admin_stop_all')">Stop All Recordings</button>
                </div>
            </div>

            <div id="camera-shell" class="feed-shell">
                <img id="camera-feed" src="" alt="Live camera stream" />
            </div>
        </div>

        <div class="card">
            <div class="header-row">
                <h3>Recent Recordings</h3>
            </div>
            <p class="subtitle">Latest uploads from connected devices</p>
            <div id="video-list" class="empty"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const selectedDeviceEl = document.getElementById('selected-device');
        const agentSelect = document.getElementById('agent-select');
        const cameraFeed = document.getElementById('camera-feed');
        const cameraShell = document.getElementById('camera-shell');
        const recordingChip = document.getElementById('recording-chip');
        const cameraChip = document.getElementById('camera-chip');
        const controlFeedbackEl = document.getElementById('control-feedback');
        const startRecBtn = document.getElementById('btn-start-rec');
        const stopRecBtn = document.getElementById('btn-stop-rec');
        const startCamBtn = document.getElementById('btn-start-cam');
        const stopCamBtn = document.getElementById('btn-stop-cam');

        if (window.location.protocol === 'file:') {
            statusEl.innerText = 'Open this dashboard via https://remote-agent-node.onrender.com';
            window.location.replace('https://remote-agent-node.onrender.com');
        }

        const socketBaseUrl = `${window.location.protocol}//${window.location.host}`;
        const socket = io(socketBaseUrl, { transports: ['websocket', 'polling'], autoConnect: false });
        const videoList = document.getElementById('video-list');
        let selectedAgentId = '';
        const agentRuntimeState = {};

        function setStatus(message, state) {
            statusEl.classList.remove('connected', 'error');
            if (state) {
                statusEl.classList.add(state);
            }
            statusEl.innerText = message;
        }

        function setCameraImage(source) {
            cameraFeed.src = source;
            cameraShell.classList.toggle('has-image', Boolean(source));
        }

        function updateVideoEmptyState() {
            videoList.classList.toggle('empty', videoList.children.length === 0);
        }

        function setControlFeedback(message, type = '') {
            controlFeedbackEl.className = `control-feedback ${type}`.trim();
            controlFeedbackEl.innerText = message;
        }

        function setChipState(chip, label, state) {
            chip.classList.remove('on', 'off', 'unknown');

            if (state === true) {
                chip.classList.add('on');
                chip.innerText = `${label}: ON`;
                return;
            }

            if (state === false) {
                chip.classList.add('off');
                chip.innerText = `${label}: OFF`;
                return;
            }

            chip.classList.add('unknown');
            chip.innerText = `${label}: Unknown`;
        }

        function updateControlButtons(state, online) {
            const hasDevice = Boolean(selectedAgentId);
            const canControl = hasDevice && online;
            const isRecording = Boolean(state?.recording);
            const isCameraOn = Boolean(state?.cameraOn);

            startRecBtn.disabled = !canControl || isRecording;
            stopRecBtn.disabled = !canControl || !isRecording;
            startCamBtn.disabled = !canControl || isCameraOn;
            stopCamBtn.disabled = !canControl || !isCameraOn;
        }

        function updateRuntimeStateUI() {
            if (!selectedAgentId) {
                setChipState(recordingChip, 'Recording', null);
                setChipState(cameraChip, 'Camera', null);
                updateControlButtons(null, false);
                return;
            }

            const state = agentRuntimeState[selectedAgentId];
            const isOnline = Boolean(state?.online);

            setChipState(recordingChip, 'Recording', isOnline ? state?.recording : null);
            setChipState(cameraChip, 'Camera', isOnline ? state?.cameraOn : null);
            updateControlButtons(state, isOnline);
        }

        updateVideoEmptyState();
        updateRuntimeStateUI();

        function send(event) {
            if (!socket.connected) {
                setControlFeedback('Please login first to send controls.', 'warn');
                return;
            }

            socket.emit(event);
        }

        function sendControl(event) {
            if (!socket.connected) {
                setControlFeedback('Please login first to send controls.', 'warn');
                return;
            }

            if (!selectedAgentId) {
                alert('Please select a target device first.');
                return;
            }

            if (!agentRuntimeState[selectedAgentId]?.online) {
                alert('Selected device is offline.');
                return;
            }

            socket.emit(event, { targetId: selectedAgentId });
            setControlFeedback('Command sent. Waiting for device confirmation...', 'pending');
        }

        function renderAgents(agents) {
            const activeIds = new Set(agents.map((agent) => agent.id));

            Object.keys(agentRuntimeState).forEach((agentId) => {
                if (!activeIds.has(agentId)) {
                    delete agentRuntimeState[agentId];
                }
            });

            agents.forEach((agent) => {
                agentRuntimeState[agent.id] = {
                    recording: Boolean(agent.recording),
                    cameraOn: Boolean(agent.cameraOn),
                    online: true,
                    updatedAt: Date.now()
                };
            });

            const hasSelected = agents.some((agent) => agent.id === selectedAgentId);
            if (!hasSelected) {
                selectedAgentId = agents[0]?.id || '';
            }

            agentSelect.innerHTML = '';

            if (agents.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = 'No active device';
                agentSelect.appendChild(option);
                selectedDeviceEl.innerText = 'Selected device: none';
                setControlFeedback('No active device connected.', 'warn');
                setCameraImage('');
                updateRuntimeStateUI();
                return;
            }

            agents.forEach((agent) => {
                const option = document.createElement('option');
                option.value = agent.id;
                const recordingText = agent.recording ? 'REC ON' : 'REC OFF';
                const cameraText = agent.cameraOn ? 'CAM ON' : 'CAM OFF';
                option.textContent = `${agent.machine} (${agent.id.slice(0, 6)}) • ${recordingText} • ${cameraText}`;
                agentSelect.appendChild(option);
            });

            agentSelect.value = selectedAgentId;
            const selectedLabel = agentSelect.options[agentSelect.selectedIndex]?.text || 'none';
            selectedDeviceEl.innerText = `Selected device: ${selectedLabel}`;
            updateRuntimeStateUI();
        }

        agentSelect.addEventListener('change', () => {
            selectedAgentId = agentSelect.value;
            const selectedLabel = agentSelect.options[agentSelect.selectedIndex]?.text || 'none';
            selectedDeviceEl.innerText = `Selected device: ${selectedLabel}`;
            setCameraImage('');
            setControlFeedback('', '');
            updateRuntimeStateUI();
        });

        socket.on('update_agent_list', (agents) => {
            renderAgents(agents);
        });

        socket.on('ui_camera_display', (data) => {
            if (selectedAgentId && data.agentId !== selectedAgentId) {
                return;
            }

            setCameraImage('data:image/jpeg;base64,' + data.image);
        });

        socket.on('ui_agent_state', (data) => {
            if (!data?.agentId) {
                return;
            }

            agentRuntimeState[data.agentId] = {
                recording: Boolean(data.recording),
                cameraOn: Boolean(data.cameraOn),
                online: data.online !== false,
                updatedAt: Date.now()
            };

            if (data.online === false && selectedAgentId === data.agentId) {
                setCameraImage('');
            }

            if (selectedAgentId === data.agentId) {
                updateRuntimeStateUI();
                const recordingText = data.recording ? 'Recording ON' : 'Recording OFF';
                const cameraText = data.cameraOn ? 'Camera ON' : 'Camera OFF';
                const feedbackType = data.online === false ? 'warn' : 'ok';
                setControlFeedback(`${recordingText} • ${cameraText}`, feedbackType);
            }
        });

        socket.on('connect', () => {
            setStatus(`Connected: ${socket.id}`, 'connected');
        });

        socket.on('connect_error', (err) => {
            setStatus(`Connection failed: ${err.message}`, 'error');
        });

        socket.on('disconnect', (reason) => {
            setStatus(`Disconnected: ${reason}`, 'error');
            Object.keys(agentRuntimeState).forEach((agentId) => {
                agentRuntimeState[agentId].online = false;
            });
            updateRuntimeStateUI();
            setControlFeedback('Connection lost. Waiting to reconnect...', 'warn');
        });

        socket.on('new_video_link', (data) => {
            const link = document.createElement('a');
            link.href = data.url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.innerText = `Video from ${data.machine} - ${new Date().toLocaleTimeString()}`;
            videoList.prepend(link);
            updateVideoEmptyState();
        });
    </script>
    <script>
        const authShellEl = document.getElementById('auth-shell');
        const dashboardEl = document.getElementById('dashboard');
        const loginFormEl = document.getElementById('login-form');
        const loginEmailEl = document.getElementById('login-email');
        const loginPasswordEl = document.getElementById('login-password');
        const loginButtonEl = document.getElementById('btn-login');
        const logoutButtonEl = document.getElementById('btn-logout');
        const authFeedbackEl = document.getElementById('auth-feedback');
        const userEmailEl = document.getElementById('user-email');

        function setAuthFeedback(message, type = '') {
            authFeedbackEl.className = `control-feedback ${type}`.trim();
            authFeedbackEl.innerText = message;
        }

        function setAuthUI(loggedIn, email = '') {
            authShellEl.classList.toggle('hidden', loggedIn);
            dashboardEl.classList.toggle('hidden', !loggedIn);
            userEmailEl.innerText = email;
        }

        function connectAuthenticatedSocket(idToken) {
            socket.auth = {
                token: idToken,
                clientType: 'dashboard'
            };
            socket.connect();
        }

        async function initDashboardAuth() {
            try {
                const configResponse = await fetch('/firebase-config');
                if (!configResponse.ok) {
                    throw new Error('Firebase config missing on server.');
                }

                const firebaseConfig = await configResponse.json();
                firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();

                loginFormEl.addEventListener('submit', async (event) => {
                    event.preventDefault();
                    const email = loginEmailEl.value.trim();
                    const password = loginPasswordEl.value;

                    if (!email || !password) {
                        setAuthFeedback('Email and password are required.', 'warn');
                        return;
                    }

                    loginButtonEl.disabled = true;
                    setAuthFeedback('Signing in...', 'pending');

                    try {
                        await auth.signInWithEmailAndPassword(email, password);
                        loginPasswordEl.value = '';
                    } catch (error) {
                        setAuthFeedback(error.message || 'Login failed.', 'warn');
                    } finally {
                        loginButtonEl.disabled = false;
                    }
                });

                logoutButtonEl.addEventListener('click', async () => {
                    try {
                        await auth.signOut();
                    } catch (error) {
                        setAuthFeedback(error.message || 'Logout failed.', 'warn');
                    }
                });

                auth.onAuthStateChanged(async (user) => {
                    socket.disconnect();
                    socket.auth = {};

                    if (!user) {
                        setAuthUI(false);
                        renderAgents([]);
                        videoList.innerHTML = '';
                        updateVideoEmptyState();
                        setAuthFeedback('Please login with Firebase email/password.', 'pending');
                        setStatus('Login required', 'error');
                        return;
                    }

                    setAuthUI(true, user.email || '');
                    setStatus('Authenticating...', '');

                    try {
                        const idToken = await user.getIdToken(true);
                        connectAuthenticatedSocket(idToken);
                        setAuthFeedback('', '');
                    } catch (error) {
                        setAuthUI(false);
                        setAuthFeedback(error.message || 'Could not get auth token.', 'warn');
                        setStatus('Authentication token failed', 'error');
                    }
                });
            } catch (error) {
                setAuthFeedback(error.message || 'Authentication setup failed.', 'warn');
                setStatus('Authentication setup failed', 'error');
                loginButtonEl.disabled = true;
            }
        }

        initDashboardAuth();
    </script>
</body>

</html>
